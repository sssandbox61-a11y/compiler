name: Build JNI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_HOME: /opt/android-ndk-r25b

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip wget

    - name: Unzip JNI folder
      run: |
        unzip jni.zip -d .

    - name: Download Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip android-ndk-r25b-linux.zip -d /opt

    - name: Build JNI with ndk-build
      run: |
        $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=./jni/Android.mk

    - name: Upload compiled libraries
      uses: actions/upload-artifact@v3
      with:
        name: native-libs
        path: libs/  # adjust if your .so files are in obj/ or libs/
